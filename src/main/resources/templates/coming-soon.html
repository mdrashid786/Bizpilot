<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title th:text="${business.businessName}"></title>
</head>

<body>

<h1 th:text="${business.businessName}"></h1>

<p th:text="${business.description}"></p>

<h2 th:text="${config.dashboardSectionLabel}"></h2>

<div th:each="item : ${categoryData}">

    <div th:each="field : ${item}">

        <b th:text="${field.key}"></b> :

        <span th:text="${field.value}"></span>

        <br>

    </div>

    <hr>

</div>

</body>

</html>
